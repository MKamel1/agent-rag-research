name: Nightly real-adapter tests

# TEST-STRATEGY.md "CI expectations": real-adapter contract tests run nightly/on-demand, not on
# every push (they need the GPU box + live Qdrant/GROBID/TEI, and a first-run MinerU model
# download). A red run here blocks a release decision, not every commit.
#
# `workflow_dispatch` only (no cron schedule yet) and `self-hosted`, not `ubuntu-latest`: these
# tests need the same GPU + Docker services (Qdrant, GROBID, TEI) already running on the
# development workstation for local runs this session — a GitHub-hosted runner has no GPU and
# would attempt a slow first-time model download plus stand up every service from scratch on each
# run. Wire up a real self-hosted runner + a cron schedule once that's worth the always-on cost;
# until then this is triggered by hand when you want the real-adapter numbers checked.

on:
  workflow_dispatch: {}

jobs:
  real-adapter-tests:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up conda env
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: agent-rag-research

      # `-m real_adapter` selects the marker-gated tests (e.g. rag/test_parser.py's golden-fixture
      # suite, which needs GROBID + MinerU's first-run model download) and overrides pyproject.toml's
      # default `-m 'not real_adapter'`. `--allow-hosts` permits the local Docker services this
      # already-running workstation exposes; MinerU's model download (huggingface.co/modelscope,
      # first run only — subsequent runs use its on-disk cache) needs the public internet too, which
      # a self-hosted runner already has.
      - name: Run real-adapter tests (needs GROBID :8070, Qdrant :6333, TEI, live GPU)
        shell: bash -l {0}
        run: pytest -m real_adapter --allow-hosts=127.0.0.1,localhost,huggingface.co,modelscope.cn -v

      # Also exercises the VectorIndex/Qdrant and Embedder real-adapter cases that use
      # pytest-socket's own `enable_socket` marker + skip-on-connect-failure instead of this
      # `real_adapter` marker (see rag/test_vector_index.py's `test_real_adapter_satisfies_contract`)
      # -- those aren't marker-selected above, so run the full suite with sockets allowed too,
      # deselecting nothing, so they get a real chance to connect instead of skipping.
      - name: Run full suite with sockets enabled (exercises enable_socket-gated real adapters)
        shell: bash -l {0}
        run: pytest -m "" --allow-hosts=127.0.0.1,localhost,huggingface.co,modelscope.cn -v
