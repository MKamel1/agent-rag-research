name: CI

# T-F5 (WORK-BREAKDOWN.md): unit+fake+golden tests run on every push, no GPU/network, must be fast and
# green. T-F6 (WORK-BREAKDOWN.md) adds the `enforcement` job below, mechanizing CONVENTIONS.md §12's
# checks (a)-(i) via `ci/run_enforcement.py` + `ci/checks/*` — see that package for the checks
# themselves and `ci/checks/test_checks.py` for the fixture-backed proof each one fires.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
    # `labeled`/`unlabeled` are NOT in GitHub's default set for `pull_request`
    # (`opened`/`synchronize`/`reopened`), and check (e) -- the foundation-change label gate,
    # `ci/checks/foundation_label.py` -- is decided entirely by the PR's labels. Without these two
    # types, the one action the failure message tells you to take (add the label) re-runs nothing:
    # the check stays red until someone happens to know they must push another commit or re-run the
    # job by hand. Observed on PR #166. Adding the label now re-evaluates the gate on its own, and
    # REMOVING it re-runs too, so a foundation change can't be un-labelled into a stale green.
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up conda env
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: agent-rag-research

      - name: Run unit tests (zero-GPU, zero-network)
        shell: bash -l {0}
        run: |
          export CUDA_VISIBLE_DEVICES=""
          pytest; status=$?
          # exit code 5 = "no tests collected" — expected on this bootstrap commit (WORK-BREAKDOWN.md
          # M0 Done criterion: "green pipeline on an empty skeleton"). Any other non-zero code is a
          # real failure. Once Owner F/A-E start committing test files, this tolerance stops mattering
          # because real tests will exist and exit 0/1 instead of 5.
          if [ "$status" -ne 0 ] && [ "$status" -ne 5 ]; then exit "$status"; fi
        # `--disable-socket` is already the pytest default via pyproject.toml's addopts (T-F6(i)) — a
        # test that bypasses its fake and reaches for a live Qdrant/HF download/GPU fails loudly here
        # instead of silently passing.

  # T-F6: mechanizes CONVENTIONS.md §12's checklist. Runs against the changed-file list only (never
  # a full-repo scan — see ci/run_enforcement.py's module docstring for why a full-repo scan would
  # make this job fail on every future unrelated push once real vendor adapters land).
  enforcement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history, not the default shallow clone: checks (a)-(d)/(f)-(h) diff against the
          # push's previous commit or the PR's merge-base, both of which need real ancestor commits
          # to exist locally. fetch-depth: 0 also brings in origin/main's remote-tracking ref,
          # needed below for a branch's first push (no "before" commit of its own yet).
          fetch-depth: 0

      # Belt-and-suspenders for the "first push of a new branch" case (ci/checks/changed_files.py):
      # explicit, not relying solely on checkout's fetch-depth: 0 behavior, since that push has no
      # prior commit on its own branch to diff against and needs origin/main's tip to compute a
      # merge-base with.
      - name: Ensure origin/main is available for diff-base computation
        run: git fetch origin main

      - name: Set up conda env
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: agent-rag-research

      # (a)-(d), (f)-(h): lexical/structural checks against the changed-file list. (e) (the
      # foundation-change label) only runs inside this same step when the event is `pull_request` —
      # ci/run_enforcement.py prints an explicit "skipped" line on `push` instead of silently
      # omitting it, since a push event carries no PR label context to check at all.
      #
      # GITHUB_TOKEN/GITHUB_REPOSITORY: check (e) fetches the PR's labels live from the GitHub API
      # (ci/run_enforcement.py's `_pr_labels`) instead of trusting GITHUB_EVENT_PATH's one-time
      # snapshot, which goes stale the moment a label is added after the triggering event fired.
      # `secrets.GITHUB_TOKEN` is Actions' own auto-issued per-run token (default permissions
      # include read access to issues/PRs, which is all a labels GET needs) — no new secret to
      # provision. GITHUB_REPOSITORY is already in every step's default env; naming it here too
      # matches this step's existing explicit style for GITHUB_EVENT_NAME/GITHUB_EVENT_PATH above.
      - name: Run CONVENTIONS.md §12 checks (a)-(d), (f)-(h), and (e) on pull_request
        shell: bash -l {0}
        run: python -m ci.run_enforcement
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      # (i) is proven, not enforced here — the actual zero-socket wiring lives in `unit-tests`
      # (pytest-socket's `--disable-socket`, pyproject.toml's default addopts) and
      # `CUDA_VISIBLE_DEVICES=""` (set in that job's own step). This step is the Done-criterion
      # proof that the wiring really blocks a real network call, not just "would have been slow" —
      # see ci/proof_socket_block/test_real_network_blocked.py's module docstring for why it's run
      # explicitly here instead of inside the normal `unit-tests` suite.
      - name: Prove check (i)'s socket-block wiring actually blocks a real connection
        shell: bash -l {0}
        run: pytest ci/proof_socket_block/ -v --disable-socket

  # Real-adapter contract tests + the retrieval eval run nightly/on-demand, not on every push
  # (TEST-STRATEGY.md "CI expectations") — add a separate scheduled workflow once those adapters exist.
